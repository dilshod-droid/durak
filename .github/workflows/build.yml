name: Build APK with Buildozer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false        # Android SDK kerak — o'chirmaymiz
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'          # pip cache — qayta build tezroq

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libffi-dev libssl-dev zip unzip \
            openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libasound2-dev libpulse-dev git

      - name: Install Buildozer, Cython and dependencies
        run: |
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv

      - name: Set up Buildozer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK with Buildozer
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()            # Xato bo'lsa ham APK ni ko'chirishga harakat qiladi
        with:
          name: durak-app-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()           # Faqat xato bo'lganda log yuklanadi
        with:
          name: build-log
          path: build.log
